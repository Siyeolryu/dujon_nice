<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>현장·소장 배정현황 — 공무 플랫폼</title>
  <link rel="stylesheet" href="assets/css/base.css">
  <link rel="stylesheet" href="assets/css/components.css">
  <link rel="stylesheet" href="assets/css/print.css">
  <style>
    #map { width: 100%; height: 420px; border-radius: var(--radius); background: var(--c-neutral-soft); }
    .map-placeholder {
      height: 420px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: var(--sp-3);
      color: var(--c-text-sub);
      text-align: center;
      padding: var(--sp-4);
    }
    .assign-ok { color: var(--c-success); font-weight: 700; }
    .assign-far { color: var(--c-danger); font-weight: 700; }
    @media (max-width: 860px) { #map, .map-placeholder { height: 300px; } }
  </style>
</head>
<body class="app">
  <div class="main">
    <div class="topbar">
      <button class="menu-toggle" data-menu-toggle>☰</button>
      <h1>현장·소장 배정현황</h1>
      <span class="sub">지도에서 현장 위치와 소장 배정을 확인</span>
      <span class="spacer"></span>
      <button class="btn" id="btnGeocode">주소 → 좌표 변환</button>
      <a class="btn primary" href="settings.html">+ 현장·담당자 등록</a>
    </div>
    <div class="content">
      <!-- 지도 -->
      <div class="card">
        <div class="card-head">
          <h2>🗺️ 현장 지도</h2>
          <span class="spacer"></span>
          <span class="small muted" id="mapStatus"></span>
        </div>
        <div class="card-body" id="mapArea"></div>
      </div>

      <!-- 소장 배정 검토 -->
      <div class="card mt-4">
        <div class="card-head">
          <h2>📍 소장 배정 검토 <span class="small muted">(현재 배정 현장 기준 30km 판정)</span></h2>
          <span class="spacer"></span>
          <select class="select" id="judgeManager"></select>
        </div>
        <div class="card-body" id="judgeArea"></div>
      </div>

      <!-- 배정 표 -->
      <div class="card mt-4">
        <div class="card-head"><h2>👷 소장별 배정 현황</h2></div>
        <div class="card-body" id="assignArea"></div>
      </div>
    </div>
  </div>

  <script src="assets/js/store.js"></script>
  <script src="assets/js/ui.js"></script>
  <script src="assets/js/geo.js"></script>
  <script>
    UI.init("sites", "현장·소장 배정현황");
    UI.bindModalClose();

    let map = null;
    let mapReady = false;

    /* ---------- 지도 ---------- */
    function renderMapPlaceholder(msg, showSettingsLink) {
      document.getElementById("mapArea").innerHTML = `
        <div class="map-placeholder">
          <div style="font-size:34px">🗺️</div>
          <p>${msg}</p>
          ${showSettingsLink ? `<a class="btn" href="settings.html">설정에서 카카오맵 키 입력</a>` : ""}
        </div>`;
    }

    async function initMap() {
      const sites = Store.list("sites");
      if (!Store.getMeta().kakaoKey) {
        renderMapPlaceholder("카카오맵 JavaScript 키가 없어 지도를 표시할 수 없습니다.<br>표 기능은 아래에서 정상 사용 가능합니다.", true);
        document.getElementById("mapStatus").textContent = "키 미등록";
        return;
      }
      try {
        await Geo.loadKakao();
      } catch (e) {
        renderMapPlaceholder("카카오맵을 불러오지 못했습니다.<br>키가 올바른지, 카카오 개발자 콘솔에 현재 도메인이 등록됐는지 확인하세요.", true);
        document.getElementById("mapStatus").textContent = "로드 실패";
        UI.toast("카카오맵 로드에 실패했습니다.", "error");
        return;
      }
      document.getElementById("mapArea").innerHTML = `<div id="map"></div>`;
      const located = sites.filter((s) => s.lat != null && s.lng != null);
      const center = located.length
        ? new kakao.maps.LatLng(located[0].lat, located[0].lng)
        : new kakao.maps.LatLng(37.5665, 126.9780);
      map = new kakao.maps.Map(document.getElementById("map"), { center, level: 9 });
      mapReady = true;

      const bounds = new kakao.maps.LatLngBounds();
      located.forEach((s) => {
        const pos = new kakao.maps.LatLng(s.lat, s.lng);
        bounds.extend(pos);
        const marker = new kakao.maps.Marker({ map, position: pos, title: s.name });
        const manager = UI.personName(s.siteManagerId);
        const iw = new kakao.maps.InfoWindow({
          content: `<div style="padding:8px 12px;font-size:13px;line-height:1.6;min-width:180px">
            <b>${UI.esc(s.name)}</b><br>
            ${UI.esc(s.sigungu || "")} · ${UI.esc(s.status || "")}<br>
            소장: ${UI.esc(manager)}</div>`,
        });
        kakao.maps.event.addListener(marker, "click", () => iw.open(map, marker));
        new kakao.maps.CustomOverlay({
          map, position: pos, yAnchor: 0,
          content: `<div style="background:#1b3a5c;color:#fff;padding:2px 8px;border-radius:10px;font-size:11px;margin-top:4px">${UI.esc(s.name)}</div>`,
        });
      });
      if (located.length > 1) map.setBounds(bounds);
      document.getElementById("mapStatus").textContent =
        `현장 ${sites.length}곳 중 ${located.length}곳 좌표 표시`;
      if (sites.length > located.length) {
        document.getElementById("mapStatus").textContent += " · 좌표 없는 현장은 [주소 → 좌표 변환] 실행";
      }
    }

    /* ---------- 좌표 일괄 변환 ---------- */
    document.getElementById("btnGeocode").addEventListener("click", async () => {
      const targets = Store.list("sites", (s) => s.address && (s.lat == null || s.lng == null));
      if (!targets.length) { UI.toast("변환할 현장이 없습니다. (주소가 있고 좌표가 없는 현장 대상)"); return; }
      if (!Store.getMeta().kakaoKey) { UI.toast("먼저 설정에서 카카오맵 키를 입력하세요.", "error"); return; }
      try {
        await Geo.loadKakao();
      } catch {
        UI.toast("카카오맵 로드에 실패했습니다. 키·도메인 등록을 확인하세요.", "error");
        return;
      }
      let ok = 0, fail = 0;
      for (const s of targets) {
        try {
          const g = await Geo.geocode(s.address);
          Store.update("sites", s.id, g);
          ok++;
        } catch { fail++; }
      }
      UI.toast(`좌표 변환 완료: 성공 ${ok}건${fail ? `, 실패 ${fail}건 (주소 확인 필요)` : ""}`, fail ? "error" : "success");
      initMap();
      renderJudge();
      renderAssign();
    });

    /* ---------- 소장 배정 검토 ---------- */
    function renderJudge() {
      const managerId = document.getElementById("judgeManager").value;
      const area = document.getElementById("judgeArea");
      const sites = Store.list("sites", (s) => s.status !== "준공");
      if (!managerId) {
        area.innerHTML = `<p class="muted small">소장을 선택하면 그 소장의 <b>현재 배정 현장 기준</b>으로 각 현장까지의 거리와 30km 판정을 표시합니다.</p>`;
        return;
      }
      const bases = Geo.currentSitesOf(managerId).filter((s) => s.lat != null);
      const baseLabel = bases.length
        ? `기준 현장: ${bases.map((b) => UI.esc(b.name)).join(", ")}`
        : `현재 배정 현장이 없거나 좌표가 없습니다 — 거리 제약 없이 배정 가능합니다.`;
      const rows = sites.filter((s) => s.siteManagerId !== managerId).map((s) => {
        const j = Geo.assignJudge(managerId, s);
        let distCell, judgeCell;
        if (!j) { distCell = `<span class="muted">좌표 없음</span>`; judgeCell = `<span class="muted">변환 필요</span>`; }
        else if (j.km == null) { distCell = "-"; judgeCell = `<span class="assign-ok">배정 가능</span>`; }
        else {
          distCell = `${j.km.toFixed(1)} km <span class="small muted">(${UI.esc(j.baseSiteName)} 기준)</span>`;
          judgeCell = j.ok ? `<span class="assign-ok">배정 가능</span>` : `<span class="assign-far">원거리 (30km 이상)</span>`;
        }
        const curManager = UI.personName(s.siteManagerId);
        return `<tr class="no-hover">
          <td>${UI.esc(s.name)}</td>
          <td>${UI.esc(s.sigungu || "-")} ${s.sigungu ? `<span class="badge gray">${Geo.regionType(s.sigungu)}</span>` : ""}</td>
          <td>${UI.badge(s.status)}</td>
          <td>${UI.esc(curManager)}</td>
          <td>${distCell}</td>
          <td>${judgeCell}</td>
          <td><button class="btn sm" data-assign="${s.id}">이 소장으로 배정</button></td>
        </tr>`;
      }).join("");
      area.innerHTML = `
        <p class="small muted">${baseLabel}</p>
        <div class="table-wrap mt-2"><table class="table">
          <thead><tr><th>현장명</th><th>시/군</th><th>상태</th><th>현재 소장</th><th>거리</th><th>판정</th><th>배정</th></tr></thead>
          <tbody>${rows || `<tr class="no-hover"><td colspan="7" class="muted center">배정 검토할 다른 현장이 없습니다.</td></tr>`}</tbody>
        </table></div>`;
      area.querySelectorAll("[data-assign]").forEach((btn) =>
        btn.addEventListener("click", () => {
          const site = Store.get("sites", btn.dataset.assign);
          const person = Store.get("people", managerId);
          if (confirm(`${site.name} 현장의 소장을 ${person.name}(으)로 배정할까요?`)) {
            Store.update("sites", site.id, { siteManagerId: managerId });
            UI.toast("배정했습니다.", "success");
            renderJudge();
            renderAssign();
            initMap();
          }
        }));
    }

    /* ---------- 소장별 배정 현황 표 ---------- */
    function renderAssign() {
      const area = document.getElementById("assignArea");
      const sites = Store.list("sites");
      const managers = Store.list("people", (p) => p.role === "현장소장" && p.active !== false);
      if (!sites.length) {
        area.innerHTML = `<div class="empty"><div class="empty-icon">🏗️</div>
          <p>등록된 현장이 없습니다.</p>
          <a class="btn primary" href="settings.html">설정에서 현장 등록</a></div>`;
        return;
      }
      const unassigned = sites.filter((s) => !s.siteManagerId && s.status !== "준공");
      const blocks = managers.map((m) => {
        const mySites = sites.filter((s) => s.siteManagerId === m.id);
        const rows = mySites.map((s) => `
          <tr class="no-hover">
            <td>${UI.esc(s.name)}</td>
            <td>${UI.esc(s.sigungu || "-")}</td>
            <td>${UI.badge(s.status)}</td>
            <td class="nowrap small">${UI.fmtDate(s.startDate)} ~ ${UI.fmtDate(s.endDate)}</td>
            <td>${s.bandUrl ? `<a href="${UI.esc(s.bandUrl)}" target="_blank" rel="noopener">밴드 열기</a>` : `<span class="muted">-</span>`}</td>
          </tr>`).join("");
        return `<div class="section">
          <div class="section-title">👷 ${UI.esc(m.name)} ${UI.esc(m.rank || "")} <span class="badge navy">${mySites.length}개 현장</span></div>
          ${mySites.length ? `<div class="table-wrap"><table class="table">
            <thead><tr><th>현장명</th><th>시/군</th><th>상태</th><th>공사기간</th><th>네이버밴드</th></tr></thead>
            <tbody>${rows}</tbody></table></div>`
          : `<p class="muted small">배정된 현장이 없습니다.</p>`}
        </div>`;
      }).join("");
      const unassignedBlock = unassigned.length ? `
        <div class="section">
          <div class="section-title">⚠️ 소장 미배정 현장 <span class="badge red">${unassigned.length}건</span></div>
          <div class="table-wrap"><table class="table">
            <thead><tr><th>현장명</th><th>시/군</th><th>상태</th><th>공사기간</th></tr></thead>
            <tbody>${unassigned.map((s) => `
              <tr class="no-hover overdue">
                <td>${UI.esc(s.name)}</td>
                <td>${UI.esc(s.sigungu || "-")}</td>
                <td>${UI.badge(s.status)}</td>
                <td class="nowrap small">${UI.fmtDate(s.startDate)} ~ ${UI.fmtDate(s.endDate)}</td>
              </tr>`).join("")}</tbody></table></div>
        </div>` : "";
      area.innerHTML = (unassignedBlock + blocks) ||
        `<p class="muted small">현장소장 역할의 담당자를 설정에서 등록하세요.</p>`;
    }

    /* ---------- 초기화 ---------- */
    document.getElementById("judgeManager").innerHTML = UI.personOptions("", "현장소장", "소장 선택");
    document.getElementById("judgeManager").addEventListener("change", renderJudge);
    initMap();
    renderJudge();
    renderAssign();
  </script>
</body>
</html>
